<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="menu">
  <div id="menu-bar" onclick="menuOnClick()">
    <div id="bar1" class="bar"></div>
    <div id="bar2" class="bar"></div>
    <div id="bar3" class="bar"></div>
  </div>
  <nav class="nav" id="nav">
    <ul>
      <li><button type="button" class="colorButton paletteItem" onclick="setTheme('default')">Simple</button></li>
      <li><button type="button" class="colorButton paletteItem" onclick="setTheme('mint')">Mint Chocolate</button></li>
      <li><button type="button" class="colorButton paletteItem" onclick="setTheme('navy')">Snowy Blue</button></li>
      <li><button type="button" class="colorButton paletteItem" onclick="setTheme('terra')">Terracotta</button></li>
      <li><button type="button" class="colorButton paletteItem" onclick="setTheme('cute')">Cute</button></li>
    </ul>
  </nav> 
</div>

<div class="menu-bg" id="menu-bg"></div>
    <div class="container">
        <h1>Simple Weather Viewer</h1>
        <div class="search">
            <input type="text" id="cityInput" placeholder="Type any city...">
            <button id="getWeatherBtn">Search</button>
        </div>
        <div class="result" id="weatherResult"></div>
    </div>
    <footer>
        <p class="footers"><a href="https://mhill.design">Moira Hill</a> | 2026</p>
    </footer>
    <script src="scripts.js"></script>
</body>

</html>
